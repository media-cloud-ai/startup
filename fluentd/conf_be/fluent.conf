# fluentd/conf/fluent.conf
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Filter for the multiline messages
#   As positive lookahead is used in regex, when there is no new message for
#   more than 3s, flush appends and log is sent to ElasticSearch via the label.
#   TODO : see if possible to do this in a more beautiful way.
<filter *.**>
  @type concat
  key log
  stream_identity_key container_id
  flush_interval 3
  timeout_label @TIMEOUTFLUSH
  multiline_start_regexp /^[0-9:\.]{12}\s/
  multiline_end_regexp /(?=[0-9:\.]{12}\s)$/
</filter>

<filter *.**>
  @type parser
  key_name log
  <parse>
    @type multi_format
    <pattern>
      format regexp
      expression /^(?<logtime>[0-9:\.]{12}) (?<request>request_id=[a-zA-Z-0-9_\-]{1,20}) (?<severity>\[[a-z]*\]) (?<message>.*)$/m
      time_key logtime
      time_format %H:%M:%S
    </pattern>
    <pattern>
      format regexp
      expression /^(?<logtime>[0-9:\.]{12}) (?<severity>\[[a-z]*\]) (?<message>.*)$/m
      time_key logtime
      time_format %H:%M:%S
    </pattern>
  </parse>
</filter>

# Copy the logs to ElasticSearch
<match *.**>
  @type copy
  <store>
    @type elasticsearch
    host "#{ENV['FLUENT_ELASTICSEARCH_HOST']}"
    user "#{ENV['FLUENT_ELASTICSEARCH_USER']}"
    password "#{ENV['FLUENT_ELASTICSEARCH_PWD']}"
    port 9200
    logstash_format true
    logstash_prefix fluentd-backend
    logstash_dateformat %Y%m%d
    include_tag_key true
    type_name access_log
    tag_key @log_name
  </store>
  <store>
    @type stdout
  </store>
</match>

<label @TIMEOUTFLUSH>
  <filter *.**>
    @type parser
    key_name log
    <parse>
      @type multi_format
      <pattern>
        format regexp
        expression /^(?<logtime>[0-9:\.]{12}) (?<request>request_id=[a-zA-Z-0-9_\-]{1,20}) (?<severity>\[[a-z]*\]) (?<message>.*)$/m
        time_key logtime
        time_format %H:%M:%S
      </pattern>
      <pattern>
        format regexp
        expression /^(?<logtime>[0-9:\.]{12}) (?<severity>\[[a-z]*\]) (?<message>.*)$/m
        time_key logtime
        time_format %H:%M:%S
      </pattern>
    </parse>
  </filter>

  # Copy the logs to ElasticSearch
  <match *.**>
    @type copy
    <store>
      @type elasticsearch
      host "#{ENV['FLUENT_ELASTICSEARCH_HOST']}"
      user "#{ENV['FLUENT_ELASTICSEARCH_USER']}"
      password "#{ENV['FLUENT_ELASTICSEARCH_PWD']}"
      port 9200
      logstash_format true
      logstash_prefix fluentd-backend
      logstash_dateformat %Y%m%d
      include_tag_key true
      type_name access_log
      tag_key @log_name
    </store>
    <store>
      @type stdout
    </store>
  </match>
</label>
